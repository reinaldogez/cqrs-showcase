services:
  mongo:
    image: mongo:latest
    container_name: mongo-container
    networks:
      - mydockernetwork
    volumes:
      - mongodb_data_container:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

networks:
  mydockernetwork:
    name: mydockernetwork

volumes:
  mongodb_data_container:
    name: mongodb_data_container
